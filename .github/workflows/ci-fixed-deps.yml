name: CI Build (Fixed Dependencies)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with atopile-kicad (with dependency fixes)
        env:
          ATO_CI: "1"
          ATOPILE_TELEMETRY: "false"
          DO_NOT_TRACK: "1"
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/github/workspace \
            -w /github/workspace \
            -e ATO_CI=1 \
            -e ATOPILE_TELEMETRY=false \
            -e DO_NOT_TRACK=1 \
            ghcr.io/atopile/atopile-kicad:latest \
            bash -c '
              echo "=== Setting up environment ==="
              
              # Create telemetry config to disable it
              mkdir -p ~/.config/atopile
              echo -e "telemetry: false\nid: disabled" > ~/.config/atopile/config.yaml
              
              echo "=== Running atopile install ==="
              atopile install || {
                echo "=== Install failed, trying sync approach ==="
                
                # Try a different approach - use sync command if available
                atopile sync || {
                  echo "=== Sync also failed, checking dependencies ==="
                  
                  # List dependencies for debugging
                  echo "Current ato.yaml:"
                  cat ato.yaml
                  
                  # Try to install without dependencies first
                  echo "=== Attempting minimal install ==="
                  
                  # Create a minimal ato.yaml temporarily
                  cp ato.yaml ato.yaml.backup
                  echo -e "requires-atopile: \">=0.2.0\"\nbuilds:\n  default:\n    entry: elec/src/veramonitor.ato:Veramonitor\ndependencies: []" > ato.yaml
                  
                  atopile install || {
                    echo "Even minimal install failed"
                    mv ato.yaml.backup ato.yaml
                    exit 1
                  }
                  
                  # Restore original
                  mv ato.yaml.backup ato.yaml
                }
              }
              
              echo "=== Running atopile build ==="
              atopile build || {
                echo "=== Build failed, checking for partial results ==="
                find /github/workspace -name "*.kicad_*" -o -name "build" -type d
                exit 1
              }
              
              echo "=== Build completed successfully ==="
            '

      - name: Check build output
        run: |
          # List all files to see what was generated
          echo "=== Listing all files in workspace ==="
          find . -type f -name "*.zip" -o -name "*.csv" -o -name "*.pos" -o -name "*.kicad_*" -o -name "*.pdf" | sort
          
          # Check if build directory exists
          if [ -d "build" ]; then
            echo "=== Build directory contents ==="
            ls -la build/
            find build -type f | sort
          else
            echo "Build directory does not exist"
          fi
          
          # Check for any KiCad files generated
          echo "=== Looking for KiCad files ==="
          find . -name "*.kicad_pcb" -o -name "*.kicad_sch" | sort

      - name: Upload Combined Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            build/
            **/*.kicad_pcb
            **/*.kicad_sch
            **/*.csv
            **/*.pos
            **/*.zip
            **/*.pdf